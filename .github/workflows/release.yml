name: Release

on:
  workflow_dispatch:
    branches:
      - main

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Apply changesets
        run: pnpm changeset version

      - name: Build
        run: make build

      - name: Commit and tag
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changesets to release"
            exit 0
          fi
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"

      - name: Copy README into package
        run: cp README.md packages/cli/README.md

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --provenance --access public

      - name: Package drivers tarball
        run: make package-drivers-tarball

      - name: Extract release notes
        run: |
          # Pull the top section of the CLI package CHANGELOG.md (everything
          # between the first '## ' heading and the next one) into release-notes.md.
          awk '
            /^## / { if (found) exit; found=1; next }
            found { print }
          ' packages/cli/CHANGELOG.md > release-notes.md || true
          if [ ! -s release-notes.md ]; then
            VERSION=$(node -p "require('./packages/cli/package.json').version")
            echo "Release v${VERSION}" > release-notes.md
          fi

      - name: Create GitHub Release and upload drivers tarball
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-notes.md \
            dist-drivers/drivers.tar.gz

      - name: Notify houwert.dev to sync changelogs
        # Fires a repository_dispatch on DouweBos/houwert.dev so its
        # `Sync changelogs` workflow regenerates src/data/changelogs.generated.json
        # and commits it to main. That commit is what triggers the
        # Cloudflare Pages rebuild — keeps the repo and the deployed site
        # in lockstep. WEBSITE_DISPATCH_TOKEN is a fine-grained PAT with
        # `Actions: Read and write` on DouweBos/houwert.dev. Skipped silently
        # if not configured.
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "WEBSITE_DISPATCH_TOKEN not set — skipping website notify"
            exit 0
          fi
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          gh api repos/DouweBos/houwert.dev/dispatches \
            --method POST \
            -f event_type=upstream-release \
            -F "client_payload[product]=conductor" \
            -F "client_payload[version]=${VERSION}"
          echo "Notified houwert.dev of conductor v${VERSION}"
