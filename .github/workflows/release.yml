name: Release

on:
  workflow_dispatch:
    branches:
      - main

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Apply changesets
        run: pnpm changeset version

      - name: Sync skill version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          sed -i '' "s/^version: .*/version: ${VERSION}/" packages/cli/skills/conductor/SKILL.md
          sed -i '' "s/^    version: .*/    version: ${VERSION}/" packages/cli/skills/skills.yaml

      - name: Build
        run: make build

      - name: Commit and tag
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changesets to release"
            exit 0
          fi
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"

      - name: Copy README into package
        run: cp README.md packages/cli/README.md

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --provenance --access public
